<!-- FOOLPROOF BACK TO TOP -->
<style>
.b2t-fixed {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: var(--brand, #FF2E93);
  color: #fff;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 890;
  opacity: 0;
  visibility: hidden;
  transform: translateY(20px);
  transition: all 0.3s ease;
  box-shadow: 0 4px 12px rgba(255, 46, 147, 0.3);
}
.b2t-fixed.show {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}
.b2t-fixed:hover {
  background: #E62280;
  box-shadow: 0 8px 24px rgba(255, 46, 147, 0.5);
  transform: translateY(-4px);
}
</style>
<button class="b2t-fixed" id="b2t-btn" aria-label="Back to Top">
  <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</button>
<script>
  (function() {
    var btn = document.getElementById('b2t-btn');
    if (btn) {
      window.addEventListener('scroll', function() {
        if (window.scrollY > 50) {
          btn.classList.add('show');
        } else {
          btn.classList.remove('show');
        }
      });
      btn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }
  })();
</script>
